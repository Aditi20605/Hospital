<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Send SMS Notification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: url('Hospital-Management-System.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.5);
            z-index: -1;
        }

        header {
            background: rgba(0, 51, 102, 0.8);
            padding: 20px;
            font-size: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        }

        h1 { margin: 0; font-size: 32px; font-weight: 600; }
        h2 { margin: 30px 0 20px; font-size: 24px; font-weight: 500; }

        form {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            margin: auto;
            padding: 30px;
            max-width: 400px;
            color: white;
            box-shadow: 0px 6px 15px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        label {
            font-weight: 500;
            display: block;
            text-align: left;
            margin-top: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            background: #00b4d8;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #0077b6;
        }

        .message {
            margin-top: 20px;
            font-weight: 600;
            background: rgba(0, 255, 100, 0.2);
            padding: 12px;
            border-radius: 10px;
            color: #e0ffe0;
            border: 1px solid #00ffcc;
            display: none;
        }

        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
            z-index: 2;
        }

        .back-button:hover {
            background-color: #005b8c;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s ease;
            z-index: 2;
        }

        .logout-btn:hover {
            background: #cc0000;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 43, 92, 0.9);
            color: white;
            padding: 10px 0;
            font-size: 14px;
            text-align: center;
            box-shadow: 0px -2px 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>Hospital Management System</h1>
    </header>

    <a href="/dashboard" class="back-button">Back</a>
    <a href="/logout" class="logout-btn">Logout</a>

    <h2>Send SMS Notification</h2>

    <!-- Flash message -->
    <div id="flashMessage" class="message"></div>

    <form method="POST" action="/SMS_notification">
        <label for="patient_name">Patient Name:</label>
        <input type="text" name="patient_name" id="patient_name" placeholder="e.g., Raj" required>
    
        <label for="appointment_time">Appointment Time:</label>
        <input type="text" name="appointment_time" id="appointment_time" placeholder="e.g., 11:30 AM" required>
    
        <label for="to_number">Recipient Phone Number:</label>
        <input type="tel" name="to_number" id="to_number" placeholder="+1234567890" required>
    
        <button type="submit">Send SMS</button>
    </form>
    

    <footer>
        <p>&copy; Hospital Management System | Designed by Your Team</p>
    </footer>

    <script>
        // Receive message via query param ?msg=... or Flask injection
        const statusMessage = "{{ status }}";  // Injected via render_template_string
        if (statusMessage && statusMessage !== "None") {
            const flash = document.getElementById("flashMessage");
            flash.innerText = statusMessage;
            flash.style.display = "block";
        }
    </script>

</body>
</html>
