<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System - Patient Dashboard</title>
</head>
<body>
    <header>
        <h1>HOSPITAL MANAGEMENT SYSTEM</h1>
        <h2>Doctor Dashboard</h2>
    </header>
    <button class="back-button" onclick="goBack()">Back</button>
    <a href="/logout" class="logout-btn">Logout</a>
    

    <div class="container">
        <a href="view_appointments.html" class="feature">
            <img src="26568_appointment-icon-png.png" alt="View Appointment">
            <span>View Appointment</span>
        </a>
        <a href="manage_appointment.html" class="feature">
            <img src="26568_appointment-icon-png.png" alt="Manage Patient Appointments">
            <span>Manage Patient Appointments</span>
        </a>
    </div>
    <script>
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
<style>
    /* Import Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

/* Reset and Fullscreen Background */
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: url('Hospital-Management-System.jpg') no-repeat center center fixed;
    background-size: cover;
    text-align: center;
    color: white;
    position: relative;
}

/* Add a Semi-Transparent Overlay for Better Visibility */
body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 51, 102, 0.5); /* Dark Blue Transparent Layer */
    z-index: -1;
}

/* Header Styling */
header {
    background: rgba(0, 51, 102, 0.8); /* Semi-transparent Blue */
    padding: 20px;
    font-size: 20px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
}

h1 {
    margin: 0;
    font-size: 32px;
    font-weight: 600;
}

h2 {
    margin: 10px 0;
    font-size: 20px;
    font-weight: 400;
}

/* Container for Features */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 50px;
}

/* Feature Box Styling */
.feature {
    width: 220px; /* Slightly bigger */
    height: 240px;
    background: rgba(255, 255, 255, 0.15); /* More visible white */
    backdrop-filter: blur(8px);
    border-radius: 20px;
    margin: 20px;
    text-align: center;
    padding: 20px;
    text-decoration: none;
    color: white;
    transition: transform 0.3s, background 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0px 6px 15px rgba(255, 255, 255, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.4);
}

/* Increase Icon Size */
.feature img {
    width: 110px;
    height: 110px;
    margin-bottom: 15px;
}

/* Improve Text Readability */
.feature span {
    font-size: 20px;
    font-weight: 600;
    text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.4);
}

/* Hover Effect */
.feature:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.1);
    box-shadow: 0px 8px 20px rgba(255, 255, 255, 0.5);
}

/* Footer Styling */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0, 43, 92, 0.9);
    color: white;
    padding: 15px 0;
    font-size: 16px;
    text-align: center;
    box-shadow: 0px -2px 10px rgba(0, 0, 0, 0.5);
}

.back-button {
    position: fixed;
    top: 20px;
    right: 20px;
    background-color: #0077b6;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.3s ease;
}

.back-button:hover {
    background-color: #0077b6;
}

.logout-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    background: #ff4d4d;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    text-decoration: none;
    transition: background 0.3s ease;
}


.logout-btn:hover {
    background: #cc0000;
}

</style>
