<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Bills</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: url('Hospital-Management-System.jpg') no-repeat center center fixed;
            background-size: cover;
            text-align: center;
            color: white;
            position: relative;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.5);
            z-index: -1;
        }
        header {
            background: rgba(0, 51, 102, 0.8);
            padding: 20px;
            font-size: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        }
        h1 { margin: 0; font-size: 32px; font-weight: 600; }
        h2 { margin: 30px 0 20px; font-size: 24px; font-weight: 500; }

        table {
            width: 90%;
            margin: auto;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-collapse: collapse;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 6px 15px rgba(255, 255, 255, 0.3);
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        th {
            background: rgba(0, 51, 102, 0.8);
            font-weight: bold;
        }

        .back-button, .logout-btn {
            position: fixed;
            top: 20px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            z-index: 2;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .back-button {
            right: 20px;
            background-color: #0077b6;
            color: white;
        }
        .back-button:hover { background-color: #005b8c; }
        .logout-btn {
            left: 20px;
            background: #ff4d4d;
            color: white;
        }
        .logout-btn:hover { background: #cc0000; }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 43, 92, 0.9);
            color: white;
            padding: 10px 0;
            font-size: 14px;
            text-align: center;
            box-shadow: 0px -2px 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>Hospital Management System</h1>
    </header>

    <a href="/dashboard" class="back-button">Back</a>
    <a href="/logout" class="logout-btn">Logout</a>

    <h2>Patient Bills</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Patient ID</th>
            <th>Patient Name</th>
            <th>Doctor</th>
            <th>Service</th>
            <th>Amount</th>
            <th>Date</th>
        </tr>
    </table>

    <footer>
        <p>&copy; Hospital Management System | Designed by Your Team</p>
    </footer>

</body>
</html>
