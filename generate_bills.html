<!DOCTYPE html>
<html>
<head>
    <title>Generate Bills - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: url('Hospital-Management-System.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            position: relative;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.5);
            z-index: -1;
        }
        header {
            background: rgba(0, 51, 102, 0.8);
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .logout-btn, .back-button {
            position: fixed;
            top: 20px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 2;
        }
        .logout-btn {
            left: 20px;
            background: #ff4d4d;
        }
        .logout-btn:hover {
            background: #cc0000;
        }
        .back-button {
            right: 20px;
            background-color: #0077b6;
        }
        .back-button:hover {
            background-color: #005b8c;
        }

        form {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            margin: 50px auto;
            padding: 30px;
            max-width: 450px;
            color: white;
            box-shadow: 0px 6px 15px rgba(255, 255, 255, 0.3);
        }

        label, input[type="text"], input[type="number"], select {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        select {
            background: rgba(255, 255, 255, 0.7);
            color: black;
            font-weight: bold;
        }

        .services-group {
            margin-top: 20px;
            text-align: left;
        }
        .services-group label {
            display: block;
            font-weight: normal;
            margin: 5px 0;
        }

        .form-actions {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .submit-btn {
            background: #00b4d8;
            color: white;
        }
        .submit-btn:hover {
            background: #0077b6;
        }
        .clear-btn {
            background: #cccccc;
            color: black;
        }

        .message {
            margin-top: 20px;
            font-weight: 600;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0, 255, 100, 0.2);
            border: 1px solid #00ffcc;
            text-align: center;
        }

        table {
            width: 90%;
            margin: 40px auto;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            color: white;
            box-shadow: 0px 6px 15px rgba(255, 255, 255, 0.3);
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        th {
            background-color: rgba(0, 102, 204, 0.6);
        }

        a.edit-link {
            color: #00ffcc;
            text-decoration: underline;
            font-weight: bold;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 43, 92, 0.9);
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }
    </style>
    <script>
        function calculateTotal() {
            let checkboxes = document.querySelectorAll('input[name="services"]:checked');
            let total = 0;
            checkboxes.forEach(box => {
                total += parseInt(box.getAttribute("data-price"));
            });
            document.getElementById("total").value = total;
        }

        function clearForm() {
            document.getElementById("billForm").reset();
            document.getElementById("total").value = "";
        }
    </script>
</head>
<body>

    <header>Generate Patient Bill</header>
    <a href="/logout"><button class="logout-btn">Logout</button></a>
    <a href="/dashboard"><button class="back-button">Back</button></a>

    <form method="POST" action="/generate_bills" id="billForm">
        <label for="patient_id">Patient ID:</label>
        <input type="text" name="patient_id" required>

        <div class="services-group">
            <strong>Select Services:</strong>
            <label><input type="checkbox" name="services" value="Consultation" data-price="500" onclick="calculateTotal()"> Consultation (₹500)</label>
            <label><input type="checkbox" name="services" value="X-Ray" data-price="800" onclick="calculateTotal()"> X-Ray (₹800)</label>
            <label><input type="checkbox" name="services" value="Blood Test" data-price="400" onclick="calculateTotal()"> Blood Test (₹400)</label>
            <label><input type="checkbox" name="services" value="MRI Scan" data-price="2000" onclick="calculateTotal()"> MRI Scan (₹2000)</label>
            <label><input type="checkbox" name="services" value="Vaccination" data-price="600" onclick="calculateTotal()"> Vaccination (₹600)</label>
        </div>

        <label for="total">Total Amount (₹):</label>
        <input type="number" name="total" id="total" readonly required>

        <div class="form-actions">
            <button type="submit" class="submit-btn">Generate Bill</button>
            <button type="button" class="clear-btn" onclick="clearForm()">Clear</button>
        </div>
    </form>

    <div id="message" class="message" style="display:none;"></div>

    <h2 style="text-align:center;">Generated Bills</h2>
    <div id="bill_table"></div>

    <footer>© Hospital Management System</footer>

    <script>
        fetch('/get_bills')
            .then(res => res.text())
            .then(html => {
                document.getElementById("bill_table").innerHTML = html;
            });

        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get('msg');
        if (msg) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.style.display = "block";
        }
    </script>
</body>
</html>
