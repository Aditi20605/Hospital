<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Background Image */
        body {
            background: url('Hospital-Management-System.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            text-align: center;
            position: relative;
        }

        /* Transparent Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #0077b6;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1.5px;
            text-shadow: 1px 1px 4px rgba(0, 119, 182, 0.3);
            border-bottom: 3px solid #00b4d8;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        h2 {
            font-size: 24px;
            margin-bottom: 25px;
        }

        /* Logout & Back Button Container */
        .top-buttons {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
        }

        /* Logout Button - Top Left */
        .logout-btn {
            padding: 10px 20px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
        }

        .logout-btn:hover {
            background: #cc0000;
        }

        /* Back Button - Top Right */
        .back-btn {
            padding: 10px 20px;
            background: #00b4d8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #0077b6;
        }

        /* Role Selection */
        .roles {
            display: flex;
            justify-content: center;
            gap: 35px;
        }

        .role {
            background: rgba(255, 255, 255, 0.25);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            transition: 0.3s;
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .role img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
        }

        .role span {
            font-weight: 600;
            color: #fff;
            font-size: 20px;
        }

        .role:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

    </style>
</head>
<body>
    
    <!-- Logout & Back Buttons -->
    <div class="top-buttons">
        <a href="/logout" class="logout-btn">Logout</a>
        <button class="back-btn" onclick="goBack()">Back</button>
    </div>

    <div class="container">
        <h1>Hospital Management System</h1>
        <h2>Welcome, {{ session['username'] }}</h2>
        <h3>Select Your Role</h3>

        <div class="roles">
            <a href="dashboard_doctor.html" class="role">
                <img src="doctor-symbol-png-favpng-nnPkCYtDQXJmbGvZ9gFGCXVyL.jpg" alt="Doctor">
                <span>Doctor</span>
            </a>
            <a href="dashboard_patient.html" class="role">
                <img src="patient-icon-8.png" alt="Patient">
                <span>Patient</span>
            </a>
            <a href="dashboard_receptionist.html" class="role">
                <img src="medical_receptionist-1024.webp" alt="Receptionist">
                <span>Receptionist</span>
            </a>
        </div>
    </div>

    <!-- JavaScript for Back Button -->
    <script>
        function goBack() {
            window.history.back();
        }
    </script>

</body>
</html>
