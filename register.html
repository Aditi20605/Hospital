<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="/">Login</a></p>
    </div>
</body>
</html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

    body {
        font-family: 'Roboto', sans-serif;
        background-color: #e8f0fe; /* Light hospital blue */
        text-align: center;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    
    /* 🏥 Container (Form Box) */
    .container {
        width: 360px;
        background: #ffffff;
        padding: 30px 25px;
        border-radius: 12px;
        box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.08);
        border-top: 5px solid #007bff; /* Hospital blue accent */
    }
    
    /* 🏷️ Headings */
    h2 {
        font-size: 26px;
        font-weight: 700;
        color: #0056b3;
        margin-bottom: 25px;
    }
    
    /* 🔤 Labels */
    label {
        display: block;
        text-align: left;
        font-weight: 500;
        margin: 12px 0 6px;
        color: #333;
    }
    
    /* ✏️ Input Fields */
    input, select {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border: 1px solid #cfd8dc;
        border-radius: 6px;
        font-size: 15px;
        background-color: #f9fbfd;
        transition: border-color 0.3s;
    }
    
    input:focus, select:focus {
        border-color: #007bff;
        outline: none;
        background-color: #fff;
    }
    
    /* ✅ Button */
    button {
        background-color: #007bff;
        color: white;
        padding: 12px;
        width: 100%;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        margin-top: 15px;
        transition: background-color 0.3s ease;
    }
    
    button:hover {
        background-color: #0056b3;
    }
    
    /* 🔗 Links */
    a {
        color: #007bff;
        text-decoration: none;
        font-weight: 500;
        display: inline-block;
        margin-top: 15px;
    }
    
    a:hover {
        text-decoration: underline;
    }
    
    /* 📱 Responsive Design */
    @media (max-width: 480px) {
        .container {
            width: 90%;
            padding: 20px;
        }
    }
    
</style>
